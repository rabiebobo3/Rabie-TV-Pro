
name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.0
      - name: Auto-Organize
        run: |
          mkdir -p app/src/main/java/com/rabie/tv
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          cp MainActivity.java app/src/main/java/com/rabie/tv/ 2>/dev/null || true
          cp *.xml app/src/main/res/layout/ 2>/dev/null || true
          mv app/src/main/res/layout/AndroidManifest.xml app/src/main/ 2>/dev/null || true
          mv app/src/main/res/layout/strings.xml app/src/main/res/values/ 2>/dev/null || true
      - name: Build
        run: gradle assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Pro-APK
          path: "**/*.apk"
