name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          # 1. إنشاء الهيكل (كودك الممتاز)
          mkdir -p app/src/main/java/com/rtv/tv
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # 2. نقل الملفات (كودك الممتاز)
          cp MainActivity.java app/src/main/java/com/rtv/tv/ 2>/dev/null || true
          cp main.xml app/src/main/res/layout/ 2>/dev/null || true
          cp AndroidManifest.xml app/src/main/ 2>/dev/null || true
          
          # 3. الربط (إضافة ملف الإعدادات لكي لا يتوه المصنع)
          echo "include ':app'" > settings.gradle
          cp build.gradle app/ 2>/dev/null || true

          # 4. الأمر الصحيح للبناء (هنا التغيير الوحيد)
          gradle :app:assembleDebug --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Pro
          path: "**/*.apk"
