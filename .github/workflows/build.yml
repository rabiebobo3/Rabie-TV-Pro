name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Licenses & Build
        run: |
          # الموافقة على شروط أندرويد آلياً لكي لا يعلق
          yes | sdkmanager --licenses || true
          # بناء التطبيق مع تجاهل المشاكل التقنية القديمة
          gradle assembleDebug --no-daemon
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Pro
          path: "**/*.apk"
