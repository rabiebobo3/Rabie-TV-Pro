name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Build
        run: |
          # إنشاء الهيكل الصحيح آلياً
          mkdir -p app/src/main/java/com/rtv/tv
          [ -f MainActivity.java ] && cp MainActivity.java app/src/main/java/com/rtv/tv/
          echo "include ':app'" > settings.gradle
          # تشغيل البناء مباشرة بدون كاش
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Pro
          path: app/build/outputs/apk/debug/*.apk
