name: Build Rabie TV Pro
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Organize Project (com.rtv.tv)
        run: |
          # إنشاء المجلدات لتطابق الباكج نيم الخاص بك
          mkdir -p app/src/main/java/com/rtv/tv
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # نقل ملف الجافا للمسار الصحيح
          cp MainActivity.java app/src/main/java/com/rtv/tv/ 2>/dev/null || true
          
          # نقل ملفات التصميم
          cp *.xml app/src/main/res/layout/ 2>/dev/null || true
          
          # ترتيب المانيفست والقيم
          [ -f app/src/main/res/layout/AndroidManifest.xml ] && mv app/src/main/res/layout/AndroidManifest.xml app/src/main/ || true
          [ -f app/src/main/res/layout/strings.xml ] && mv app/src/main/res/layout/strings.xml app/src/main/res/values/ || true
          [ -f app/src/main/res/layout/styles.xml ] && mv app/src/main/res/layout/styles.xml app/src/main/res/values/ || true

      - name: Build APK
        run: gradle clean assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Pro-VLC
          path: "**/*.apk"
