name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          # إنشاء مجلدات المشروع آلياً
          mkdir -p app/src/main/java/com/rtv/tv
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          
          # ترتيب الملفات في أماكنها
          cp MainActivity.java app/src/main/java/com/rtv/tv/ 2>/dev/null || true
          cp main.xml app/src/main/res/layout/ 2>/dev/null || true
          cp AndroidManifest.xml app/src/main/ 2>/dev/null || true
          
          # استخدام gradle العام بدلاً من gradlew المفقود
          gradle assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Pro
          path: "**/*.apk"
