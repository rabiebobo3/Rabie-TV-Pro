name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build
        run: |
          mkdir -p app/src/main/java/com/rtv/tv
          mkdir -p app/src/main/res/layout
          cp MainActivity.java app/src/main/java/com/rtv/tv/ 2>/dev/null || true
          cp *.xml app/src/main/res/layout/ 2>/dev/null || true
          gradle assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Rabie-TV-Pro
          path: "**/*.apk"
